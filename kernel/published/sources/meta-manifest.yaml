project:
  id: kernel
  name: Kernel
  version: 0.1.0
  status: active
  owners:
    - _404
  last_updated: 2026-03-25

purpose:
  summary: >
    Authoritative retrieval and authority plane for registry-scoped manifests,
    contracts, workflows, lineage, and decision records.

scope:
  in_scope:
    - registry routing
    - canonical source priority
    - scoped manifest linking
    - contracts and schemas
    - workflow and gate policy
    - publication policy
    - lineage and decision pointers
  out_of_scope:
    - execution workspace behavior
    - artifact publication mechanics
    - unrelated repo concerns

authority:
  root: kernel
  source_priority:
    - kernel/meta-manifest.yaml
    - kernel/sources/manifest.yaml
    - kernel/manifests/contracts.yaml
    - kernel/manifests/workflows.yaml
    - kernel/manifests/publication.yaml
    - kernel/manifests/lineage.yaml
    - kernel/manifests/glossary.yaml
    - kernel/manifests/decision-register.yaml
  conflict_rule: >
    Higher-priority sources win. Unresolved conflicts must be reported and
    cannot be silently inferred.

retrieval:
  canonical_scope_set:
    - kernel/meta-manifest.yaml
    - kernel/sources/manifest.yaml
    - kernel/manifests/contracts.yaml
    - kernel/manifests/workflows.yaml
    - kernel/manifests/publication.yaml
    - kernel/manifests/lineage.yaml
    - kernel/manifests/glossary.yaml
    - kernel/manifests/decision-register.yaml
  reference_only_sources:
    - README.md
    - AGENTS.md

linked_manifests:
  - id: sources
    ref: kernel/sources/manifest.yaml
  - id: contracts
    ref: kernel/manifests/contracts.yaml
  - id: workflows
    ref: kernel/manifests/workflows.yaml
  - id: publication
    ref: kernel/manifests/publication.yaml
  - id: lineage
    ref: kernel/manifests/lineage.yaml
  - id: glossary
    ref: kernel/manifests/glossary.yaml
  - id: decision-register
    ref: kernel/manifests/decision-register.yaml

change_control:
  freshness:
    review_cadence: on-change
    stale_when: manifest_refs_change
  compatibility:
    versioning_rule: semantic
    deprecation_policy: keep prior refs until replaced
