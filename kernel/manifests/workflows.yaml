manifest:
  id: workflows
  type: workflow_registry
  version: 0.1.0
  status: active
  owner: _404
  last_updated: 2026-03-25

scope:
  in_scope:
    - lifecycle stages
    - entry and exit criteria
    - gate names
    - handoff rules
    - required evidence
  out_of_scope:
    - artifact content generation
    - execution transport

authority:
  canonical_sources:
    - kernel/meta-manifest.yaml
    - kernel/manifests/workflows.yaml
  source_priority:
    - kernel/meta-manifest.yaml
    - kernel/manifests/workflows.yaml
  conflict_resolution: higher priority wins; workflow conflicts must be called out

workflow:
  stages:
    - requested
    - scoped
    - generated
    - validated
    - reviewed
    - published
  gates:
    - scope_resolved
    - artifact_bundle_valid
    - trust_boundary_confirmed
    - publication_policy_passed
  handoff_rules:
    - sidecar runs must begin from a resolved kernel scope set
    - authority-bearing artifacts require explicit review

contracts:
  required_artifacts:
    - kernel.meta-manifest.yaml
    - kernel/manifests/workflows.yaml
  schema_refs:
    - ref: schemas/kernel.workflow.schema.json
  policy_refs:
    - ref: policy/kernel/workflows.policy.yaml

lineage:
  parents:
    - kernel/manifests/contracts.yaml
  derived_outputs:
    - bundle/workflow-pack.json

freshness:
  review_cadence: on-change
  staleness_policy: stage or gate changes invalidate dependent packs
