docking_contract:
  artifact_request:
    artifact_class: plan_packet_bundle
    prohibited_outputs:
      - authority_manifest_edits
      - policy_edits
      - schema_edits
    required_outputs:
      - packet
      - validation_evidence
      - fingerprint_record
      - publication_recommendation
  contract_version: 1
  fingerprint:
    policy_hash: sha256:<policy-hash>
    schema_hash: sha256:<schema-hash>
    scope_hash: sha256:<scope-hash>
  freshness:
    expires_at: '2026-03-28'
    issued_at: '2026-03-25'
    kernel_policy_ingest_mode: symlink_or_sparse_checkout
    linkage_status: pending_chatgpt_project_creation
    stale_after: 72h
  invariants:
    - kernel decides truth
    - sidecar executes within declared bounds
    - no scope widening
    - no policy override
    - no publication outside kernel policy
  kernel_source_root: kernel
  resolved_scope_set:
    contract_refs:
      - schemas/kernel.contract.schema.json
      - schemas/kernel.workflow.schema.json
      - schemas/kernel.publication.schema.json
      - schemas/kernel.lineage.schema.json
      - schemas/kernel.docking-contract.schema.json
    example_bundle_refs: []
    manifest_refs:
      - kernel/meta-manifest.yaml
      - kernel/manifests/contracts.yaml
      - kernel/manifests/workflows.yaml
      - kernel/manifests/publication.yaml
      - kernel/manifests/lineage.yaml
      - kernel/manifests/glossary.yaml
      - kernel/manifests/decision-register.yaml
    publication_policy_ref: kernel/manifests/publication.yaml
    scope_set_id: ks-2026-03-25-001
    workflow_profile_ref: kernel/manifests/workflows.yaml
  sidecar_project_id: artifact-genai-loop
  trust_boundary:
    authority_bearing: false
    direct_publish_allowed: true
    human_gate_required: false
