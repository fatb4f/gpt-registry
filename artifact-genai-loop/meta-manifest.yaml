project:
  id: artifact-genai-loop
  last_updated: '2026-03-27'
  name: Artifact GenAI Loop Registry Entry
  owners:
    - _404
  status: active
  version: 0.1.0
purpose:
  summary: Registry-only handoff entry for the ChatGPT-owned artifact generation loop
    execution plane.
scope:
  in_scope:
    - execution plane discovery
    - tarball handoff pointers
    - bundle boundary description
    - review and realization boundary description
    - source routing to kernel execution artifacts
  out_of_scope:
    - local execution
    - packet generation
    - publication actions
    - authority mutation
    - runtime policy edits
authority:
  conflict_rule: Kernel execution-surface artifacts win over local summary text. Unresolved
    conflicts must be surfaced rather than inferred away.
  dependency_model: This entry is registry-only. Canonical execution semantics live
    in fatb4f/kernel under the chatgpt-pipeline execution surface.
  root: kernel
  source_priority:
    - artifact-genai-loop/docking-contract.yaml
    - artifact-genai-loop/manifest.yaml
    - artifact-genai-loop/instructions.md
    - kernel/generated/schemas/chatgpt-pipeline
retrieval:
  admissible_inputs:
    - artifact-genai-loop/docking-contract.yaml
    - artifact-genai-loop/manifest.yaml
    - kernel/generated/schemas/chatgpt-pipeline
    - released tarball bundle refs
  reference_only_sources:
    - README.md
    - AGENTS.md
linked_manifests:
  - id: handoff-contract
    ref: artifact-genai-loop/docking-contract.yaml
  - id: sources
    ref: artifact-genai-loop/manifest.yaml
  - id: instructions
    ref: artifact-genai-loop/instructions.md
change_control:
  compatibility:
    deprecation_policy: keep prior handoff refs until superseded by a newer execution
      bundle release
    versioning_rule: semantic
  freshness:
    review_cadence: on-handoff-update
    stale_when: execution_surface_hash_changes
